framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 500
                    multiplier: 2
                    max_delay: 5000

            failed:
                dsn: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\ProcessJobMessage: async
