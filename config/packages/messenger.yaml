framework:
    messenger:
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 500
                    multiplier: 2
                    max_delay: 5000

        routing:
            App\Message\ProcessJobMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
